project_id = "pusttdxrtmgvhdzdyvbd"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://marketing-os-chi-three.vercel.app"
