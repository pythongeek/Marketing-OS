<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Video & Image Production Brief</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Video & Image Production Brief</h1>
            <p>Request a video script, AI image prompt, infographic spec, or thumbnail design.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-asset_type">
  <label for="asset_type">Asset Type <span class="required">*</span></label>
  <select name="asset_type" id="asset_type" required>
    <option value="">-- Select --</option>
    <option value="Video Script (explainer)">Video Script (explainer)</option>
    <option value="Video Script (tutorial)">Video Script (tutorial)</option>
    <option value="Video Script (promotional)">Video Script (promotional)</option>
    <option value="AI Image Prompt (hero image)">AI Image Prompt (hero image)</option>
    <option value="AI Image Prompt (social graphic)">AI Image Prompt (social graphic)</option>
    <option value="Infographic Design Brief">Infographic Design Brief</option>
    <option value="Thumbnail Design Brief">Thumbnail Design Brief</option>
    <option value="Slide Deck Design Brief">Slide Deck Design Brief</option>
    <option value="Animated GIF / Motion Graphic Brief">Animated GIF / Motion Graphic Brief</option>
    <option value="Podcast Cover / Audio Graphic">Podcast Cover / Audio Graphic</option>
  </select>
</div>
<div class="field" id="field-content_topic">
  <label for="content_topic">Content Topic / Subject <span class="required">*</span></label>
  <input type="text" name="content_topic" id="content_topic" required placeholder="e.g., How our AI saves 10 hours/week on reporting" value="">
</div>
<div class="field" id="field-target_audience">
  <label for="target_audience">Target Audience <span class="required">*</span></label>
  <textarea name="target_audience" id="target_audience" required placeholder="Who is watching / viewing this? What do they care about?" rows="2"></textarea>
</div>
<div class="field" id="field-duration_length">
  <label for="duration_length">Duration / Dimensions</label>
  <input type="text" name="duration_length" id="duration_length" placeholder="e.g., 60-second video, 1200x628 social graphic, 1920x1080 thumbnail" value="">
</div>
<div class="field" id="field-style">
  <label for="style">Visual Style</label>
  <select name="style" id="style">
    <option value="Minimal / Clean" selected>Minimal / Clean</option>
    <option value="Bold / High-contrast">Bold / High-contrast</option>
    <option value="Warm / Friendly">Warm / Friendly</option>
    <option value="Corporate / Professional">Corporate / Professional</option>
    <option value="Playful / Illustrative">Playful / Illustrative</option>
    <option value="Cinematic / Dramatic">Cinematic / Dramatic</option>
    <option value="Retro / Nostalgic">Retro / Nostalgic</option>
    <option value="Tech / Futuristic">Tech / Futuristic</option>
  </select>
</div>
<div class="field" id="field-tone">
  <label for="tone">Tone / Mood</label>
  <select name="tone" id="tone">
    <option value="Educational / Informative" selected>Educational / Informative</option>
    <option value="Inspirational / Motivational">Inspirational / Motivational</option>
    <option value="Humorous / Light">Humorous / Light</option>
    <option value="Urgent / Action-oriented">Urgent / Action-oriented</option>
    <option value="Emotional / Story-driven">Emotional / Story-driven</option>
    <option value="Confident / Authoritative">Confident / Authoritative</option>
  </select>
</div>
<div class="field" id="field-key_visual_elements">
  <label for="key_visual_elements">Key Visual Elements</label>
  <textarea name="key_visual_elements" id="key_visual_elements" placeholder="What must be included? Product screenshots, people, data visualizations, specific colors, logos..." rows="2"></textarea>
</div>
<div class="field" id="field-reference_examples">
  <label for="reference_examples">Reference Examples</label>
  <textarea name="reference_examples" id="reference_examples" placeholder="URLs or descriptions of videos/images you like..." rows="2"></textarea>
</div>
<div class="field" id="field-brand_colors">
  <label for="brand_colors">Brand Colors</label>
  <input type="text" name="brand_colors" id="brand_colors" placeholder="e.g., #4A90D9, #50C878, #FFD700" value="">
</div>
<div class="field" id="field-text_overlay">
  <label for="text_overlay">Required Text / Headline</label>
  <input type="text" name="text_overlay" id="text_overlay" placeholder="e.g., 'Save 10 Hours a Week' or 'The Complete Guide to AI SEO'" value="">
</div>
<div class="field" id="field-cta">
  <label for="cta">Call to Action (if applicable)</label>
  <input type="text" name="cta" id="cta" placeholder="e.g., Watch the full video, Download the guide, Try it free" value="">
</div>
<div class="field" id="field-platform">
  <label for="platform">Primary Platform</label>
  <select name="platform" id="platform">
    <option value="YouTube" selected>YouTube</option>
    <option value="TikTok">TikTok</option>
    <option value="Instagram">Instagram</option>
    <option value="LinkedIn">LinkedIn</option>
    <option value="Twitter/X">Twitter/X</option>
    <option value="Website / Blog">Website / Blog</option>
    <option value="Email">Email</option>
    <option value="Paid Ads (Meta)">Paid Ads (Meta)</option>
    <option value="Paid Ads (Google)">Paid Ads (Google)</option>
    <option value="Multiple platforms">Multiple platforms</option>
  </select>
</div>
<div class="field" id="field-ai_tools">
  <label for="ai_tools">AI Tools to Use</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="HeyGen (AI avatars)"> HeyGen (AI avatars)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="Synthesia (AI video)"> Synthesia (AI video)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="ElevenLabs (AI voice)"> ElevenLabs (AI voice)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="Midjourney (AI images)"> Midjourney (AI images)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="DALL-E (AI images)"> DALL-E (AI images)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="Runway (AI video)"> Runway (AI video)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="Canva (design)"> Canva (design)</label>
    <label class="checkbox-item"><input type="checkbox" name="ai_tools" value="Figma (design)"> Figma (design)</label>
  </div>
</div>
<div class="field" id="field-deadline">
  <label for="deadline">Production Deadline</label>
  <input type="date" name="deadline" id="deadline" value="">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any technical constraints, accessibility requirements, or brand guidelines..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Create Production Brief</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">video-image-brief</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "asset_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "content_topic", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "target_audience", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "duration_length", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "style", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "tone", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "key_visual_elements", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "reference_examples", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "brand_colors", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "text_overlay", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "cta", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "platform", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "ai_tools", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "deadline", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🎬 Video & Image Production Brief",
                submitted_at: new Date().toISOString(),
                form_id: "video-image-brief"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'video-image-brief-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
