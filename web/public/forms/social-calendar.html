<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Social Media Calendar Request</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Social Media Calendar Request</h1>
            <p>Request a social content calendar or repurpose a published piece into 10+ formats.</p>
        </div>
        <form data-skill-slug="social-calendar" id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-content_to_repurpose">
  <label for="content_to_repurpose">Content to Repurpose (URL)</label>
  <input type="url" name="content_to_repurpose" id="content_to_repurpose" placeholder="https://example.com/blog/my-article" value="">
<div class="help">If blank, the agent will generate original content</div></div>
<div class="field" id="field-content_title">
  <label for="content_title">Content Title</label>
  <input type="text" name="content_title" id="content_title" placeholder="The article or page title" value="">
</div>
<div class="field" id="field-platforms">
  <label for="platforms">Target Platforms <span class="required">*</span></label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="LinkedIn"> LinkedIn</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Twitter/X"> Twitter/X</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Instagram"> Instagram</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="TikTok"> TikTok</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Facebook"> Facebook</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="YouTube Shorts"> YouTube Shorts</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Reddit"> Reddit</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Threads"> Threads</label>
    <label class="checkbox-item"><input type="checkbox" name="platforms" value="Newsletter"> Newsletter</label>
  </div>
</div>
<div class="field" id="field-posting_frequency">
  <label for="posting_frequency">Posting Frequency <span class="required">*</span></label>
  <select name="posting_frequency" id="posting_frequency" required>
    <option value="Daily">Daily</option>
    <option value="3x per week" selected>3x per week</option>
    <option value="2x per week">2x per week</option>
    <option value="Weekly">Weekly</option>
    <option value="As needed">As needed</option>
  </select>
</div>
<div class="field" id="field-brand_voice">
  <label for="brand_voice">Brand Voice for Social</label>
  <select name="brand_voice" id="brand_voice">
    <option value="Professional / Thought leadership" selected>Professional / Thought leadership</option>
    <option value="Casual / Conversational">Casual / Conversational</option>
    <option value="Witty / Humorous">Witty / Humorous</option>
    <option value="Educational / Helpful">Educational / Helpful</option>
    <option value="Bold / Provocative">Bold / Provocative</option>
  </select>
</div>
<div class="field" id="field-hashtag_strategy">
  <label for="hashtag_strategy">Hashtag Strategy</label>
  <input type="text" name="hashtag_strategy" id="hashtag_strategy" placeholder="e.g., #SaaS #AITools #Marketing (3-5 max per platform)" value="">
</div>
<div class="field" id="field-cta">
  <label for="cta">Primary CTA</label>
  <input type="text" name="cta" id="cta" placeholder="e.g., Read the full article, Download the guide, Join the newsletter" value="">
</div>
<div class="field" id="field-include_cta_link">
  <label for="include_cta_link">Include CTA Link</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="include_cta_link" value="Add tracked link to landing page"> Add tracked link to landing page</label>
  </div>
</div>
<div class="field" id="field-content_pillars">
  <label for="content_pillars">Content Pillars / Themes</label>
  <textarea name="content_pillars" id="content_pillars" placeholder="What topics should this calendar cover? e.g., Product tips, Industry news, Customer stories, Behind-the-scenes..." rows="3"></textarea>
</div>
<div class="field" id="field-avoid_topics">
  <label for="avoid_topics">Topics to Avoid</label>
  <textarea name="avoid_topics" id="avoid_topics" placeholder="Any sensitive subjects, competitor mentions, or off-brand topics..." rows="2"></textarea>
</div>
<div class="field" id="field-campaign_hashtag">
  <label for="campaign_hashtag">Campaign Hashtag (if applicable)</label>
  <input type="text" name="campaign_hashtag" id="campaign_hashtag" placeholder="e.g., #AcmeAI2026" value="">
</div>
<div class="field" id="field-due_date">
  <label for="due_date">Calendar Due Date</label>
  <input type="date" name="due_date" id="due_date" value="">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any platform-specific requirements, character limits, or creative direction..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Generate Calendar</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">social-calendar</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "content_to_repurpose", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "content_title", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "platforms", "type": "checkbox", "required": true, "depends_on": null, "depends_value": null}, {"name": "posting_frequency", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "brand_voice", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "hashtag_strategy", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "cta", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "include_cta_link", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "content_pillars", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "avoid_topics", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "campaign_hashtag", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "due_date", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "📅 Social Media Calendar Request",
                submitted_at: new Date().toISOString(),
                form_id: "social-calendar"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'social-calendar-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
<script src="/forms/form-api-connector.js"></script>
</body>
</html>
