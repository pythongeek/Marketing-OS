<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Local SEO — Location Management</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Local SEO — Location Management</h1>
            <p>Add or update a local business location for GBP, citation, and review management.</p>
        </div>
        <form data-skill-slug="local-seo" id="agent-form">
            
<div class="field" id="field-business_name">
  <label for="business_name">Business Name <span class="required">*</span></label>
  <input type="text" name="business_name" id="business_name" required placeholder="e.g., Acme Dental" value="">
</div>
<div class="field" id="field-business_category">
  <label for="business_category">Primary GBP Category <span class="required">*</span></label>
  <input type="text" name="business_category" id="business_category" required placeholder="e.g., Dental Clinic, Software Company, Restaurant" value="">
</div>
<div class="field" id="field-address">
  <label for="address">Full Address <span class="required">*</span></label>
  <textarea name="address" id="address" required placeholder="Street, City, State, ZIP, Country" rows="2"></textarea>
</div>
<div class="field" id="field-phone">
  <label for="phone">Phone Number</label>
  <input type="text" name="phone" id="phone" placeholder="+1-555-123-4567" value="">
</div>
<div class="field" id="field-website">
  <label for="website">Location Website</label>
  <input type="url" name="website" id="website" placeholder="https://example.com/location-name" value="">
</div>
<div class="field" id="field-gbp_url">
  <label for="gbp_url">Google Business Profile URL</label>
  <input type="url" name="gbp_url" id="gbp_url" placeholder="https://business.google.com/..." value="">
</div>
<div class="field" id="field-service_area">
  <label for="service_area">Service Area (if not storefront)</label>
  <input type="text" name="service_area" id="service_area" placeholder="e.g., 50-mile radius around Denver, CO" value="">
</div>
<div class="field" id="field-hours">
  <label for="hours">Business Hours</label>
  <textarea name="hours" id="hours" placeholder="Mon-Fri: 9am-5pm, Sat: 10am-2pm, Sun: Closed" rows="2"></textarea>
</div>
<div class="field" id="field-target_keywords">
  <label for="target_keywords">Local Target Keywords</label>
  <textarea name="target_keywords" id="target_keywords" placeholder="e.g., dentist near me, best dental clinic denver, emergency dentist..." rows="2"></textarea>
</div>
<div class="field" id="field-citations_needed">
  <label for="citations_needed">Citation Directories to Target</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Google Business Profile"> Google Business Profile</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Yelp"> Yelp</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Bing Places"> Bing Places</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Apple Maps"> Apple Maps</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Facebook"> Facebook</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Yellow Pages"> Yellow Pages</label>
    <label class="checkbox-item"><input type="checkbox" name="citations_needed" value="Industry-specific directories"> Industry-specific directories</label>
  </div>
<div class="help">Which directories need updating or creation?</div></div>
<div class="field" id="field-review_platforms">
  <label for="review_platforms">Review Platforms to Monitor</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="Google Reviews"> Google Reviews</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="Yelp"> Yelp</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="Trustpilot"> Trustpilot</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="G2"> G2</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="Capterra"> Capterra</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="BBB"> BBB</label>
    <label class="checkbox-item"><input type="checkbox" name="review_platforms" value="Facebook Reviews"> Facebook Reviews</label>
  </div>
</div>
<div class="field" id="field-review_response_tone">
  <label for="review_response_tone">Review Response Tone</label>
  <select name="review_response_tone" id="review_response_tone">
    <option value="Professional & Grateful" selected>Professional & Grateful</option>
    <option value="Warm & Personal">Warm & Personal</option>
    <option value="Concise & Business-like">Concise & Business-like</option>
    <option value="Humorous & Light">Humorous & Light</option>
  </select>
</div>
<div class="field" id="field-geo_grid_cities">
  <label for="geo_grid_cities">Geo-Grid Cities</label>
  <input type="text" name="geo_grid_cities" id="geo_grid_cities" placeholder="e.g., Denver, Boulder, Aurora, Lakewood" value="">
<div class="help">Cities to track local rankings for</div></div>
<div class="field" id="field-competitor_locations">
  <label for="competitor_locations">Competitor Locations Nearby</label>
  <textarea name="competitor_locations" id="competitor_locations" placeholder="Names and addresses of nearby competitors..." rows="2"></textarea>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any unique local requirements, seasonal changes, or special events..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Save Location</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">local-seo</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [ {"name": "business_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "business_category", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "address", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "phone", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "website", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "gbp_url", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "service_area", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "hours", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "target_keywords", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "citations_needed", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "review_platforms", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "review_response_tone", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "geo_grid_cities", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_locations", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "📍 Local SEO — Location Management",
                submitted_at: new Date().toISOString(),
                form_id: "local-seo"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'local-seo-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
<script src="/forms/form-api-connector.js"></script>
</body>
</html>
