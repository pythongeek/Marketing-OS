<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📢 Ad Campaign Setup</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📢 Ad Campaign Setup</h1>
            <p>Configure a new paid advertising campaign across Google, Meta, LinkedIn, or TikTok.</p>
        </div>
        <form id="agent-form" data-skill-slug="paid-ads-manager">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-campaign_name">
  <label for="campaign_name">Campaign Name <span class="required">*</span></label>
  <input type="text" name="campaign_name" id="campaign_name" required placeholder="e.g., Q3 SaaS Free Trial Push" value="">
</div>
<div class="field" id="field-platform">
  <label for="platform">Platform <span class="required">*</span></label>
  <select name="platform" id="platform" required>
    <option value="">-- Select --</option>
    <option value="Google Search">Google Search</option>
    <option value="Google Display">Google Display</option>
    <option value="Meta (Facebook/Instagram)">Meta (Facebook/Instagram)</option>
    <option value="LinkedIn">LinkedIn</option>
    <option value="TikTok">TikTok</option>
    <option value="Reddit">Reddit</option>
    <option value="Multi-platform">Multi-platform</option>
  </select>
</div>
<div class="field" id="field-objective">
  <label for="objective">Campaign Objective <span class="required">*</span></label>
  <select name="objective" id="objective" required>
    <option value="">-- Select --</option>
    <option value="Brand Awareness">Brand Awareness</option>
    <option value="Website Traffic">Website Traffic</option>
    <option value="Lead Generation">Lead Generation</option>
    <option value="Conversions / Sales">Conversions / Sales</option>
    <option value="App Installs">App Installs</option>
    <option value="Retargeting / Remarketing">Retargeting / Remarketing</option>
  </select>
</div>
<div class="field" id="field-budget_daily">
  <label for="budget_daily">Daily Budget (USD) <span class="required">*</span></label>
  <input type="number" name="budget_daily" id="budget_daily" required placeholder="100" min="10" max="100000" value="">
</div>
<div class="field" id="field-budget_monthly">
  <label for="budget_monthly">Monthly Budget (USD)</label>
  <input type="number" name="budget_monthly" id="budget_monthly" placeholder="3000" min="100" value="">
</div>
<div class="field" id="field-target_audience">
  <label for="target_audience">Target Audience <span class="required">*</span></label>
  <textarea name="target_audience" id="target_audience" required placeholder="Demographics, job titles, interests, behaviors, pain points..." rows="4"></textarea>
</div>
<div class="field" id="field-target_locations">
  <label for="target_locations">Target Locations <span class="required">*</span></label>
  <input type="text" name="target_locations" id="target_locations" required placeholder="e.g., US, Canada, UK, Australia" value="">
</div>
<div class="field" id="field-landing_page_url">
  <label for="landing_page_url">Landing Page URL <span class="required">*</span></label>
  <input type="url" name="landing_page_url" id="landing_page_url" required placeholder="https://example.com/free-trial" value="">
</div>
<div class="field" id="field-conversion_goal">
  <label for="conversion_goal">Primary Conversion Goal <span class="required">*</span></label>
  <input type="text" name="conversion_goal" id="conversion_goal" required placeholder="e.g., Free trial sign-up, Demo request, Ebook download" value="">
</div>
<div class="field" id="field-conversion_value">
  <label for="conversion_value">Estimated Conversion Value (USD)</label>
  <input type="number" name="conversion_value" id="conversion_value" placeholder="500" min="0" value="">
<div class="help">Used to calculate ROAS targets</div></div>
<div class="field" id="field-creative_assets">
  <label for="creative_assets">Available Creative Assets</label>
  <textarea name="creative_assets" id="creative_assets" placeholder="Headlines, descriptions, images, videos, UGC... What do you have?" rows="3"></textarea>
</div>
<div class="field" id="field-exclusions">
  <label for="exclusions">Exclusions / Restrictions</label>
  <textarea name="exclusions" id="exclusions" placeholder="e.g., No competitors as keywords, avoid these placements, brand safety rules..." rows="2"></textarea>
</div>
<div class="field" id="field-start_date">
  <label for="start_date">Campaign Start Date</label>
  <input type="date" name="start_date" id="start_date" value="">
</div>
<div class="field" id="field-end_date">
  <label for="end_date">Campaign End Date (optional)</label>
  <input type="date" name="end_date" id="end_date" value="">
</div>
<div class="field" id="field-kpis">
  <label for="kpis">Success KPIs</label>
  <input type="text" name="kpis" id="kpis" placeholder="e.g., CPA <$50, ROAS >3x, CTR >2%" value="CPA, ROAS, CTR">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes / Special Instructions</label>
  <textarea name="notes" id="notes" placeholder="Any unique campaign requirements, compliance notes, etc." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Create Campaign Brief</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">ad-campaign</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "campaign_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "platform", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "objective", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "budget_daily", "type": "number", "required": true, "depends_on": null, "depends_value": null}, {"name": "budget_monthly", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "target_audience", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "target_locations", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "landing_page_url", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "conversion_goal", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "conversion_value", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "creative_assets", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "exclusions", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "start_date", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "end_date", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "kpis", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "📢 Ad Campaign Setup",
                submitted_at: new Date().toISOString(),
                form_id: "ad-campaign"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ad-campaign-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
    <script src="/forms/form-api-connector.js"></script>
</body>
</html>
