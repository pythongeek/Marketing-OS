<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 CRO Experiment Setup</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 CRO Experiment Setup</h1>
            <p>Design an A/B test, multivariate test, or landing page optimization experiment.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-experiment_name">
  <label for="experiment_name">Experiment Name <span class="required">*</span></label>
  <input type="text" name="experiment_name" id="experiment_name" required placeholder="e.g., Homepage Hero CTA Test — V1 vs V2" value="">
</div>
<div class="field" id="field-page_url">
  <label for="page_url">Page URL <span class="required">*</span></label>
  <input type="url" name="page_url" id="page_url" required placeholder="https://example.com/landing-page" value="">
</div>
<div class="field" id="field-experiment_type">
  <label for="experiment_type">Experiment Type <span class="required">*</span></label>
  <select name="experiment_type" id="experiment_type" required>
    <option value="">-- Select --</option>
    <option value="A/B Test (2 variants)">A/B Test (2 variants)</option>
    <option value="A/B/n Test (3+ variants)">A/B/n Test (3+ variants)</option>
    <option value="Multivariate Test">Multivariate Test</option>
    <option value="Split URL Test">Split URL Test</option>
    <option value="Personalization / Targeting">Personalization / Targeting</option>
    <option value="Before/After (no split)">Before/After (no split)</option>
  </select>
</div>
<div class="field" id="field-hypothesis">
  <label for="hypothesis">Hypothesis <span class="required">*</span></label>
  <textarea name="hypothesis" id="hypothesis" required placeholder="If we change [X], then [Y] will increase because [Z]..." rows="3"></textarea>
</div>
<div class="field" id="field-primary_metric">
  <label for="primary_metric">Primary Success Metric <span class="required">*</span></label>
  <select name="primary_metric" id="primary_metric" required>
    <option value="">-- Select --</option>
    <option value="Conversion rate">Conversion rate</option>
    <option value="Click-through rate (CTR)">Click-through rate (CTR)</option>
    <option value="Form completion rate">Form completion rate</option>
    <option value="Revenue per visitor">Revenue per visitor</option>
    <option value="Average order value">Average order value</option>
    <option value="Time on page">Time on page</option>
    <option value="Bounce rate">Bounce rate</option>
    <option value="Scroll depth">Scroll depth</option>
  </select>
</div>
<div class="field" id="field-secondary_metrics">
  <label for="secondary_metrics">Secondary Metrics</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Bounce rate"> Bounce rate</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Time on page"> Time on page</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Scroll depth"> Scroll depth</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Form starts"> Form starts</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Form abandonment"> Form abandonment</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Revenue per visitor"> Revenue per visitor</label>
    <label class="checkbox-item"><input type="checkbox" name="secondary_metrics" value="Return visitor rate"> Return visitor rate</label>
  </div>
</div>
<div class="field" id="field-variant_description">
  <label for="variant_description">Variant Description <span class="required">*</span></label>
  <textarea name="variant_description" id="variant_description" required placeholder="What exactly are you testing? e.g.,
Control: Current headline 'The Best CRM'
Variant: New headline 'Close More Deals in Half the Time'" rows="4"></textarea>
</div>
<div class="field" id="field-traffic_source">
  <label for="traffic_source">Traffic Source</label>
  <input type="text" name="traffic_source" id="traffic_source" placeholder="e.g., Organic search, Paid search, Social, Email, All traffic" value="">
</div>
<div class="field" id="field-audience_segments">
  <label for="audience_segments">Audience Segments</label>
  <input type="text" name="audience_segments" id="audience_segments" placeholder="e.g., New visitors, Returning visitors, Mobile users, Desktop users" value="">
</div>
<div class="field" id="field-minimum_sample_size">
  <label for="minimum_sample_size">Minimum Sample Size</label>
  <input type="number" name="minimum_sample_size" id="minimum_sample_size" placeholder="1000" min="100" value="1000">
</div>
<div class="field" id="field-minimum_duration_days">
  <label for="minimum_duration_days">Minimum Test Duration (days)</label>
  <input type="number" name="minimum_duration_days" id="minimum_duration_days" placeholder="14" min="3" max="90" value="14">
</div>
<div class="field" id="field-confidence_level">
  <label for="confidence_level">Confidence Level</label>
  <select name="confidence_level" id="confidence_level">
    <option value="90%">90%</option>
    <option value="95%" selected>95%</option>
    <option value="99%">99%</option>
  </select>
</div>
<div class="field" id="field-tools">
  <label for="tools">Testing Tool</label>
  <select name="tools" id="tools">
    <option value="Google Optimize (deprecated — suggest alternative)">Google Optimize (deprecated — suggest alternative)</option>
    <option value="Optimizely">Optimizely</option>
    <option value="VWO">VWO</option>
    <option value="Unbounce">Unbounce</option>
    <option value="Instapage">Instapage</option>
    <option value="HubSpot A/B">HubSpot A/B</option>
    <option value="Custom JS (developer required)">Custom JS (developer required)</option>
    <option value="Not sure — recommend best tool" selected>Not sure — recommend best tool</option>
  </select>
</div>
<div class="field" id="field-implementation_notes">
  <label for="implementation_notes">Implementation Notes</label>
  <textarea name="implementation_notes" id="implementation_notes" placeholder="CMS, any existing testing infrastructure, developer availability..." rows="2"></textarea>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any prior test results, industry benchmarks, or constraints..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Design Experiment</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">cro-experiment</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "experiment_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "page_url", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "experiment_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "hypothesis", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "primary_metric", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "secondary_metrics", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "variant_description", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "traffic_source", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "audience_segments", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "minimum_sample_size", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "minimum_duration_days", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "confidence_level", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "tools", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "implementation_notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🧪 CRO Experiment Setup",
                submitted_at: new Date().toISOString(),
                form_id: "cro-experiment"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cro-experiment-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
