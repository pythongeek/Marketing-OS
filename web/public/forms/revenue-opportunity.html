<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Revenue Scout — Opportunity Intake</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Revenue Scout — Opportunity Intake</h1>
            <p>Submit a new revenue opportunity for evaluation: expansion, upsell, new channel, or partnership.</p>
        </div>
        <form data-skill-slug="revenue-opportunity" id="agent-form">
            
<div class="field" id="field-opportunity_name">
  <label for="opportunity_name">Opportunity Name <span class="required">*</span></label>
  <input type="text" name="opportunity_name" id="opportunity_name" required placeholder="e.g., Launch paid TikTok ads for Q3" value="">
</div>
<div class="field" id="field-opportunity_type">
  <label for="opportunity_type">Opportunity Type <span class="required">*</span></label>
  <select name="opportunity_type" id="opportunity_type" required>
    <option value="">-- Select --</option>
    <option value="New client / pitch">New client / pitch</option>
    <option value="Existing client upsell">Existing client upsell</option>
    <option value="New service line">New service line</option>
    <option value="New channel / platform">New channel / platform</option>
    <option value="Partnership / Co-marketing">Partnership / Co-marketing</option>
    <option value="Pricing optimization">Pricing optimization</option>
    <option value="Retention / Win-back">Retention / Win-back</option>
    <option value="Operational efficiency / Cost reduction">Operational efficiency / Cost reduction</option>
  </select>
</div>
<div class="field" id="field-estimated_revenue">
  <label for="estimated_revenue">Estimated Monthly Revenue Impact</label>
  <input type="number" name="estimated_revenue" id="estimated_revenue" placeholder="5000" min="0" value="">
</div>
<div class="field" id="field-estimated_cost">
  <label for="estimated_cost">Estimated Monthly Cost</label>
  <input type="number" name="estimated_cost" id="estimated_cost" placeholder="2000" min="0" value="">
</div>
<div class="field" id="field-time_to_revenue">
  <label for="time_to_revenue">Time to Revenue</label>
  <select name="time_to_revenue" id="time_to_revenue">
    <option value="Immediate (<1 month)">Immediate (<1 month)</option>
    <option value="Short-term (1-3 months)" selected>Short-term (1-3 months)</option>
    <option value="Medium-term (3-6 months)">Medium-term (3-6 months)</option>
    <option value="Long-term (6-12 months)">Long-term (6-12 months)</option>
  </select>
</div>
<div class="field" id="field-effort_required">
  <label for="effort_required">Effort Required</label>
  <select name="effort_required" id="effort_required">
    <option value="Low (existing resources)">Low (existing resources)</option>
    <option value="Medium (some new investment)" selected>Medium (some new investment)</option>
    <option value="High (significant new investment)">High (significant new investment)</option>
  </select>
</div>
<div class="field" id="field-strategic_fit">
  <label for="strategic_fit">Strategic Fit</label>
  <select name="strategic_fit" id="strategic_fit">
    <option value="High (core to mission)">High (core to mission)</option>
    <option value="Medium (adjacent opportunity)" selected>Medium (adjacent opportunity)</option>
    <option value="Low (exploratory)">Low (exploratory)</option>
  </select>
</div>
<div class="field" id="field-description">
  <label for="description">Description <span class="required">*</span></label>
  <textarea name="description" id="description" required placeholder="What is the opportunity? Why now? What problem does it solve?" rows="3"></textarea>
</div>
<div class="field" id="field-data_supporting">
  <label for="data_supporting">Supporting Data</label>
  <textarea name="data_supporting" id="data_supporting" placeholder="Any metrics, market research, or evidence that supports this opportunity..." rows="2"></textarea>
</div>
<div class="field" id="field-risks">
  <label for="risks">Risks & Mitigations</label>
  <textarea name="risks" id="risks" placeholder="What could go wrong? How do we mitigate?" rows="2"></textarea>
</div>
<div class="field" id="field-next_steps">
  <label for="next_steps">Proposed Next Steps</label>
  <input type="text" name="next_steps" id="next_steps" placeholder="e.g., Run 2-week test, Present to client, Build prototype..." value="">
</div>
<div class="field" id="field-priority">
  <label for="priority">Priority</label>
  <select name="priority" id="priority">
    <option value="P0 (Act immediately)">P0 (Act immediately)</option>
    <option value="P1 (High priority)">P1 (High priority)</option>
    <option value="P2 (Medium priority)" selected>P2 (Medium priority)</option>
    <option value="P3 (Low priority / backlog)">P3 (Low priority / backlog)</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any additional context..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Evaluate Opportunity</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">revenue-opportunity</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [ {"name": "opportunity_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "opportunity_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "estimated_revenue", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "estimated_cost", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "time_to_revenue", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "effort_required", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "strategic_fit", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "description", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "data_supporting", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "risks", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "next_steps", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "priority", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "💰 Revenue Scout — Opportunity Intake",
                submitted_at: new Date().toISOString(),
                form_id: "revenue-opportunity"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'revenue-opportunity-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
<script src="/forms/form-api-connector.js"></script>
</body>
</html>
