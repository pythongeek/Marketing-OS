<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Pitch & Proposal Builder</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Pitch & Proposal Builder</h1>
            <p>Build a client proposal or competitive pitch deck with audit findings and strategic recommendations.</p>
        </div>
        <form id="agent-form" data-skill-slug="content-brief-writer">
            <div class="field" id="field-client">
  <label for="client">Prospect Name <span class="required">*</span></label>
  <select name="client" id="client" required class="client-dropdown">
    <option value="">-- Select a client --</option>
</select>
<script>
(function() {
    const select = document.getElementById('client');
    if (!select) return;
    fetch('/api/clients')
        .then(r => r.json())
        .then(data => {
            const clients = data.clients || [];
            clients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.slug;
                opt.textContent = c.name + (c.industry ? ' (' + c.industry + ')' : '');
                select.appendChild(opt);
            });
        })
        .catch(err => console.error('Failed to load clients:', err));
})();
</script>
</div>
<div class="field" id="field-client_website">
  <label for="client_website">Prospect Website <span class="required">*</span></label>
  <input type="url" name="client_website" id="client_website" required placeholder="https://prospect.com" value="">
</div>
<div class="field" id="field-industry">
  <label for="industry">Industry <span class="required">*</span></label>
  <input type="text" name="industry" id="industry" required placeholder="e.g., B2B SaaS, Healthcare, E-commerce" value="">
</div>
<div class="field" id="field-company_size">
  <label for="company_size">Company Size</label>
  <select name="company_size" id="company_size">
    <option value="Startup (1-50)">Startup (1-50)</option>
    <option value="Small (51-200)">Small (51-200)</option>
    <option value="Mid-market (201-1000)" selected>Mid-market (201-1000)</option>
    <option value="Enterprise (1000+)">Enterprise (1000+)</option>
  </select>
</div>
<div class="field" id="field-proposal_type">
  <label for="proposal_type">Proposal Type <span class="required">*</span></label>
  <select name="proposal_type" id="proposal_type" required>
    <option value="">-- Select --</option>
    <option value="New client pitch">New client pitch</option>
    <option value="Upsell / Expansion">Upsell / Expansion</option>
    <option value="Renewal / Retention">Renewal / Retention</option>
    <option value="Competitive displacement (switch from another agency)">Competitive displacement (switch from another agency)</option>
    <option value="Project-based proposal">Project-based proposal</option>
    <option value="Retainer proposal">Retainer proposal</option>
  </select>
</div>
<div class="field" id="field-prospect_pain_points">
  <label for="prospect_pain_points">Prospect Pain Points <span class="required">*</span></label>
  <textarea name="prospect_pain_points" id="prospect_pain_points" required placeholder="What problems are they facing? What have they told you? What did the audit reveal?" rows="3"></textarea>
</div>
<div class="field" id="field-prospect_goals">
  <label for="prospect_goals">Prospect Goals <span class="required">*</span></label>
  <textarea name="prospect_goals" id="prospect_goals" required placeholder="What do they want to achieve? Revenue targets, traffic goals, brand awareness, etc." rows="3"></textarea>
</div>
<div class="field" id="field-competitors">
  <label for="competitors">Key Competitors</label>
  <textarea name="competitors" id="competitors" placeholder="Names and websites of their top competitors..." rows="2"></textarea>
</div>
<div class="field" id="field-audit_findings">
  <label for="audit_findings">Audit Findings to Include</label>
  <textarea name="audit_findings" id="audit_findings" placeholder="What did the competitive audit or site audit reveal? Key gaps and opportunities..." rows="3"></textarea>
</div>
<div class="field" id="field-proposed_scope">
  <label for="proposed_scope">Proposed Scope of Work <span class="required">*</span></label>
  <textarea name="proposed_scope" id="proposed_scope" required placeholder="What services are you proposing? SEO, content, paid, social, etc." rows="3"></textarea>
</div>
<div class="field" id="field-proposed_tier">
  <label for="proposed_tier">Proposed Tier</label>
  <select name="proposed_tier" id="proposed_tier">
    <option value="Starter ($2,500/mo)">Starter ($2,500/mo)</option>
    <option value="Growth ($4,500/mo)" selected>Growth ($4,500/mo)</option>
    <option value="Scale ($8,500/mo)">Scale ($8,500/mo)</option>
    <option value="Enterprise (custom)">Enterprise (custom)</option>
  </select>
</div>
<div class="field" id="field-timeline">
  <label for="timeline">Proposed Timeline</label>
  <input type="text" name="timeline" id="timeline" placeholder="e.g., 90-day initial engagement, then ongoing retainer" value="">
</div>
<div class="field" id="field-differentiator">
  <label for="differentiator">Why Us? (Differentiator)</label>
  <textarea name="differentiator" id="differentiator" placeholder="What makes your agency the right choice? Unique methodology, case studies, team expertise..." rows="3"></textarea>
</div>
<div class="field" id="field-case_studies">
  <label for="case_studies">Relevant Case Studies</label>
  <textarea name="case_studies" id="case_studies" placeholder="Past clients in the same vertical with similar results..." rows="2"></textarea>
</div>
<div class="field" id="field-team_members">
  <label for="team_members">Team Members to Mention</label>
  <textarea name="team_members" id="team_members" placeholder="Who will work on this account? Their roles and expertise..." rows="2"></textarea>
</div>
<div class="field" id="field-next_steps">
  <label for="next_steps">Proposed Next Steps</label>
  <input type="text" name="next_steps" id="next_steps" placeholder="e.g., Strategy call on [date], Contract review, Kickoff within 2 weeks" value="">
</div>
<div class="field" id="field-delivery_format">
  <label for="delivery_format">Output Format</label>
  <select name="delivery_format" id="delivery_format">
    <option value="PDF proposal" selected>PDF proposal</option>
    <option value="Google Slides deck">Google Slides deck</option>
    <option value="Notion page">Notion page</option>
    <option value="Markdown document (vault)">Markdown document (vault)</option>
    <option value="Loom video walkthrough + PDF">Loom video walkthrough + PDF</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any special requirements, pricing constraints, or deal-breakers..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Build Proposal</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">pitch-proposal</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "client_website", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "industry", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "company_size", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "proposal_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "prospect_pain_points", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "prospect_goals", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "competitors", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "audit_findings", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "proposed_scope", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "proposed_tier", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "timeline", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "differentiator", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "case_studies", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "team_members", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "next_steps", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "delivery_format", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🎯 Pitch & Proposal Builder",
                submitted_at: new Date().toISOString(),
                form_id: "pitch-proposal"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pitch-proposal-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
    <script src="/forms/form-api-connector.js"></script>
</body>
</html>
