<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AEO/GEO — Entity & Schema Registration</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 AEO/GEO — Entity & Schema Registration</h1>
            <p>Register entities, schema types, and AI citation targets for Answer Engine Optimization.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-entity_name">
  <label for="entity_name">Entity Name <span class="required">*</span></label>
  <input type="text" name="entity_name" id="entity_name" required placeholder="e.g., Acme Software" value="">
</div>
<div class="field" id="field-entity_type">
  <label for="entity_type">Entity Type <span class="required">*</span></label>
  <select name="entity_type" id="entity_type" required>
    <option value="">-- Select --</option>
    <option value="Organization">Organization</option>
    <option value="Brand">Brand</option>
    <option value="Product">Product</option>
    <option value="Person">Person</option>
    <option value="Service">Service</option>
    <option value="Event">Event</option>
    <option value="Place / Location">Place / Location</option>
    <option value="CreativeWork (article, book, video)">CreativeWork (article, book, video)</option>
  </select>
</div>
<div class="field" id="field-entity_description">
  <label for="entity_description">Entity Description <span class="required">*</span></label>
  <textarea name="entity_description" id="entity_description" required placeholder="A concise, factual description of the entity (1-2 sentences). This is what AI engines should say about you." rows="2"></textarea>
</div>
<div class="field" id="field-official_url">
  <label for="official_url">Official Canonical URL <span class="required">*</span></label>
  <input type="url" name="official_url" id="official_url" required placeholder="https://example.com/about" value="">
</div>
<div class="field" id="field-same_as_urls">
  <label for="same_as_urls">SameAs URLs (Knowledge Graph)</label>
  <textarea name="same_as_urls" id="same_as_urls" placeholder="Wikipedia, LinkedIn, Twitter, Crunchbase, etc. One per line." rows="3"></textarea>
<div class="help">These corroborate your entity across the web</div></div>
<div class="field" id="field-schema_types">
  <label for="schema_types">Schema Types to Deploy <span class="required">*</span></label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Organization"> Organization</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Product"> Product</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Service"> Service</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="FAQPage"> FAQPage</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="HowTo"> HowTo</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Article"> Article</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Person"> Person</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="LocalBusiness"> LocalBusiness</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Event"> Event</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="BreadcrumbList"> BreadcrumbList</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Review / AggregateRating"> Review / AggregateRating</label>
    <label class="checkbox-item"><input type="checkbox" name="schema_types" value="Speakable"> Speakable</label>
  </div>
</div>
<div class="field" id="field-target_ai_engines">
  <label for="target_ai_engines">Target AI Engines</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="ChatGPT / OpenAI"> ChatGPT / OpenAI</label>
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="Perplexity"> Perplexity</label>
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="Google SGE / Gemini"> Google SGE / Gemini</label>
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="Bing Copilot"> Bing Copilot</label>
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="Claude (Anthropic)"> Claude (Anthropic)</label>
    <label class="checkbox-item"><input type="checkbox" name="target_ai_engines" value="All of the above" checked> All of the above</label>
  </div>
</div>
<div class="field" id="field-target_queries">
  <label for="target_queries">Target Queries for AI Citation</label>
  <textarea name="target_queries" id="target_queries" placeholder="What questions should cite this entity? e.g., 'best CRM for small business', 'what is Acme Software'..." rows="3"></textarea>
</div>
<div class="field" id="field-corroboration_sources">
  <label for="corroboration_sources">Corroboration Sources Needed</label>
  <textarea name="corroboration_sources" id="corroboration_sources" placeholder="Where should we publish corroborating content? e.g., Industry publications, partner blogs, PR sites..." rows="2"></textarea>
</div>
<div class="field" id="field-citation_tracking">
  <label for="citation_tracking">Citation Tracking</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="citation_tracking" value="Track weekly citation rate across all AI engines"> Track weekly citation rate across all AI engines</label>
    <label class="checkbox-item"><input type="checkbox" name="citation_tracking" value="Alert if citation rate drops >20%"> Alert if citation rate drops >20%</label>
    <label class="checkbox-item"><input type="checkbox" name="citation_tracking" value="Report monthly citation trends"> Report monthly citation trends</label>
  </div>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any known entity confusion issues, disambiguation needs, or schema implementation constraints..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Register Entity</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">aeo-entity-schema</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "entity_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "entity_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "entity_description", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "official_url", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "same_as_urls", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "schema_types", "type": "checkbox", "required": true, "depends_on": null, "depends_value": null}, {"name": "target_ai_engines", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "target_queries", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "corroboration_sources", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "citation_tracking", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🧠 AEO/GEO — Entity & Schema Registration",
                submitted_at: new Date().toISOString(),
                form_id: "aeo-entity-schema"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'aeo-entity-schema-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
