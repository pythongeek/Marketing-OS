<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ Copywriting Request</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✍️ Copywriting Request</h1>
            <p>Request landing page copy, email copy, ad copy, or any short-form marketing copy.</p>
        </div>
        <form data-skill-slug="copy-request" id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-copy_type">
  <label for="copy_type">Copy Type <span class="required">*</span></label>
  <select name="copy_type" id="copy_type" required>
    <option value="">-- Select --</option>
    <option value="Landing page (hero + sections)">Landing page (hero + sections)</option>
    <option value="Email sequence (multiple emails)">Email sequence (multiple emails)</option>
    <option value="Ad copy (headlines + descriptions)">Ad copy (headlines + descriptions)</option>
    <option value="Sales page">Sales page</option>
    <option value="Product description">Product description</option>
    <option value="CTA buttons + microcopy">CTA buttons + microcopy</option>
    <option value="Homepage rewrite">Homepage rewrite</option>
    <option value="About page">About page</option>
    <option value="Pricing page">Pricing page</option>
    <option value="FAQ page">FAQ page</option>
    <option value="Case study summary">Case study summary</option>
    <option value="Social media captions">Social media captions</option>
    <option value="Video script (short)">Video script (short)</option>
    <option value="Other">Other</option>
  </select>
</div>
<div class="field" data-depends-on="copy_type" data-depends-value="Other" id="field-copy_type_other">
  <label for="copy_type_other">Other Copy Type</label>
  <input type="text" name="copy_type_other" id="copy_type_other" placeholder="Describe what you need" value="">
</div>
<div class="field" id="field-target_audience">
  <label for="target_audience">Target Audience <span class="required">*</span></label>
  <textarea name="target_audience" id="target_audience" required placeholder="Who is this for? Their pain points, desires, and current state of awareness..." rows="3"></textarea>
</div>
<div class="field" id="field-value_proposition">
  <label for="value_proposition">Value Proposition <span class="required">*</span></label>
  <textarea name="value_proposition" id="value_proposition" required placeholder="What makes this product/service uniquely valuable? What transformation does it create?" rows="3"></textarea>
</div>
<div class="field" id="field-tone">
  <label for="tone">Tone <span class="required">*</span></label>
  <select name="tone" id="tone" required>
    <option value="Professional / Authoritative" selected>Professional / Authoritative</option>
    <option value="Conversational / Friendly">Conversational / Friendly</option>
    <option value="Bold / Provocative">Bold / Provocative</option>
    <option value="Warm / Empathetic">Warm / Empathetic</option>
    <option value="Humorous / Witty">Humorous / Witty</option>
    <option value="Urgent / Scarcity-driven">Urgent / Scarcity-driven</option>
    <option value="Luxury / Premium">Luxury / Premium</option>
  </select>
</div>
<div class="field" id="field-word_count">
  <label for="word_count">Target Word Count</label>
  <input type="number" name="word_count" id="word_count" placeholder="500" min="50" max="5000" value="500">
</div>
<div class="field" id="field-key_messages">
  <label for="key_messages">Key Messages to Include</label>
  <textarea name="key_messages" id="key_messages" placeholder="Must-include points, statistics, testimonials, or proof points..." rows="3"></textarea>
</div>
<div class="field" id="field-cta">
  <label for="cta">Primary Call to Action <span class="required">*</span></label>
  <input type="text" name="cta" id="cta" required placeholder="e.g., Start your free trial, Book a demo, Get the template" value="">
</div>
<div class="field" id="field-cta_url">
  <label for="cta_url">CTA Destination URL</label>
  <input type="url" name="cta_url" id="cta_url" placeholder="https://example.com/signup" value="">
</div>
<div class="field" id="field-objections_to_address">
  <label for="objections_to_address">Objections to Address</label>
  <textarea name="objections_to_address" id="objections_to_address" placeholder="What concerns might the reader have? Price, complexity, trust, timing..." rows="2"></textarea>
</div>
<div class="field" id="field-examples">
  <label for="examples">Examples of Copy You Like</label>
  <textarea name="examples" id="examples" placeholder="Paste URLs or copy of pages/emails you admire..." rows="2"></textarea>
</div>
<div class="field" id="field-forbidden_words">
  <label for="forbidden_words">Words / Phrases to Avoid</label>
  <input type="text" name="forbidden_words" id="forbidden_words" placeholder="e.g., revolutionary, game-changing, world-class, leverage" value="">
</div>
<div class="field" id="field-seo_keywords">
  <label for="seo_keywords">SEO Keywords (if applicable)</label>
  <input type="text" name="seo_keywords" id="seo_keywords" placeholder="Primary and secondary keywords to weave in naturally" value="">
</div>
<div class="field" id="field-deadline">
  <label for="deadline">Deadline</label>
  <input type="date" name="deadline" id="deadline" value="">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any brand guidelines, compliance requirements, or special formatting..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Request Copy</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">copy-request</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "copy_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "copy_type_other", "type": "text", "required": false, "depends_on": "copy_type", "depends_value": "Other"}, {"name": "target_audience", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "value_proposition", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "tone", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "word_count", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "key_messages", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "cta", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "cta_url", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "objections_to_address", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "examples", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "forbidden_words", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "seo_keywords", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "deadline", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "✍️ Copywriting Request",
                submitted_at: new Date().toISOString(),
                form_id: "copy-request"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'copy-request-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
<script src="/forms/form-api-connector.js"></script>
</body>
</html>
