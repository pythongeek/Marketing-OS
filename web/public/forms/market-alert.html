<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Market Signals — Alert Configuration</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 Market Signals — Alert Configuration</h1>
            <p>Configure algorithm update alerts, SERP volatility monitoring, and trend detection.</p>
        </div>
        <form id="agent-form" data-skill-slug="market-researcher">
            <div class="field" id="field-client">
  <label for="client">Client (or 'All' for agency-wide)</label>
  <input type="text" name="client" id="client" placeholder="e.g., acme-saas or All" value="">
</div>
<div class="field" id="field-alert_type">
  <label for="alert_type">Alert Types <span class="required">*</span></label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Google algorithm update (confirmed)"> Google algorithm update (confirmed)</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Google algorithm update (unconfirmed chatter)"> Google algorithm update (unconfirmed chatter)</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="SERP volatility spike"> SERP volatility spike</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Competitor ranking surge"> Competitor ranking surge</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Competitor ranking drop"> Competitor ranking drop</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="New competitor enters market"> New competitor enters market</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Industry trend / news"> Industry trend / news</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="AI search engine change (SGE, Copilot, Perplexity)"> AI search engine change (SGE, Copilot, Perplexity)</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Regulatory / compliance change"> Regulatory / compliance change</label>
    <label class="checkbox-item"><input type="checkbox" name="alert_type" value="Seasonal trend shift"> Seasonal trend shift</label>
  </div>
</div>
<div class="field" id="field-monitoring_tools">
  <label for="monitoring_tools">Monitoring Tools</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="SEMrush Sensor"> SEMrush Sensor</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="SERPwoo"> SERPwoo</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Rank Ranger"> Rank Ranger</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="AccuRanker"> AccuRanker</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Google Search Status Dashboard"> Google Search Status Dashboard</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Twitter / X SEO community"> Twitter / X SEO community</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Reddit r/SEO"> Reddit r/SEO</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Industry newsletters"> Industry newsletters</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_tools" value="Google Trends"> Google Trends</label>
  </div>
</div>
<div class="field" id="field-alert_threshold">
  <label for="alert_threshold">SERP Volatility Threshold</label>
  <select name="alert_threshold" id="alert_threshold">
    <option value="Low (notify on any significant movement)">Low (notify on any significant movement)</option>
    <option value="Medium (notify on >20% position change)" selected>Medium (notify on >20% position change)</option>
    <option value="High (notify only on major updates)">High (notify only on major updates)</option>
  </select>
</div>
<div class="field" id="field-affected_keywords">
  <label for="affected_keywords">Keywords to Monitor Closely</label>
  <textarea name="affected_keywords" id="affected_keywords" placeholder="Critical keywords that would trigger immediate action if rankings change..." rows="2"></textarea>
</div>
<div class="field" id="field-notification_method">
  <label for="notification_method">Notification Method</label>
  <select name="notification_method" id="notification_method">
    <option value="Vault log entry">Vault log entry</option>
    <option value="Slack alert">Slack alert</option>
    <option value="Email alert">Email alert</option>
    <option value="All of the above" selected>All of the above</option>
  </select>
</div>
<div class="field" id="field-response_protocol">
  <label for="response_protocol">Response Protocol</label>
  <select name="response_protocol" id="response_protocol">
    <option value="Auto-analyze and report">Auto-analyze and report</option>
    <option value="Alert human + auto-report" selected>Alert human + auto-report</option>
    <option value="Alert human only (no auto-action)">Alert human only (no auto-action)</option>
  </select>
</div>
<div class="field" id="field-reporting_frequency">
  <label for="reporting_frequency">Trend Report Frequency</label>
  <select name="reporting_frequency" id="reporting_frequency">
    <option value="Daily">Daily</option>
    <option value="Weekly" selected>Weekly</option>
    <option value="Monthly">Monthly</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any specific sources, communities, or signals to watch..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Configure Alerts</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">market-alert</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "alert_type", "type": "checkbox", "required": true, "depends_on": null, "depends_value": null}, {"name": "monitoring_tools", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "alert_threshold", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "affected_keywords", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "notification_method", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "response_protocol", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "reporting_frequency", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "📡 Market Signals — Alert Configuration",
                submitted_at: new Date().toISOString(),
                form_id: "market-alert"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'market-alert-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
    <script src="/forms/form-api-connector.js"></script>
</body>
</html>
