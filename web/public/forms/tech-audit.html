<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ Technical SEO Audit Request</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Technical SEO Audit Request</h1>
            <p>Request a full technical SEO audit for a client website.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-website">
  <label for="website">Website to Audit <span class="required">*</span></label>
  <input type="url" name="website" id="website" required placeholder="https://example.com" value="">
</div>
<div class="field" id="field-audit_type">
  <label for="audit_type">Audit Type <span class="required">*</span></label>
  <select name="audit_type" id="audit_type" required>
    <option value="">-- Select --</option>
    <option value="Full 47-item audit (recommended)">Full 47-item audit (recommended)</option>
    <option value="Quick crawl (top 100 pages)">Quick crawl (top 100 pages)</option>
    <option value="Core Web Vitals only">Core Web Vitals only</option>
    <option value="Mobile usability only">Mobile usability only</option>
    <option value="Security & HTTPS only">Security & HTTPS only</option>
    <option value="Indexation & crawlability only">Indexation & crawlability only</option>
    <option value="Schema & structured data only">Schema & structured data only</option>
    <option value="Custom scope">Custom scope</option>
  </select>
</div>
<div class="field" data-depends-on="audit_type" data-depends-value="Custom scope" id="field-audit_scope_custom">
  <label for="audit_scope_custom">Custom Audit Scope</label>
  <textarea name="audit_scope_custom" id="audit_scope_custom" placeholder="Specify what to check if 'Custom scope' selected" rows="2"></textarea>
</div>
<div class="field" id="field-page_count_estimate">
  <label for="page_count_estimate">Estimated Total Pages</label>
  <input type="number" name="page_count_estimate" id="page_count_estimate" placeholder="500" min="1" value="">
</div>
<div class="field" id="field-staging_site">
  <label for="staging_site">Staging Site URL (if different from production)</label>
  <input type="url" name="staging_site" id="staging_site" placeholder="https://staging.example.com" value="">
</div>
<div class="field" id="field-has_javascript">
  <label for="has_javascript">JavaScript Rendering</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="has_javascript" value="Site uses heavy JavaScript (React, Vue, Angular) — requires JS rendering audit"> Site uses heavy JavaScript (React, Vue, Angular) — requires JS rendering audit</label>
  </div>
</div>
<div class="field" id="field-has_international">
  <label for="has_international">International / Multi-language</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="has_international" value="Site has hreflang or multi-language versions"> Site has hreflang or multi-language versions</label>
  </div>
</div>
<div class="field" id="field-has_ecommerce">
  <label for="has_ecommerce">E-commerce</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="has_ecommerce" value="Site has product pages, checkout, cart functionality"> Site has product pages, checkout, cart functionality</label>
  </div>
</div>
<div class="field" id="field-has_subdomains">
  <label for="has_subdomains">Subdomains to Include</label>
  <input type="text" name="has_subdomains" id="has_subdomains" placeholder="e.g., blog.example.com, shop.example.com" value="">
</div>
<div class="field" id="field-exclusions">
  <label for="exclusions">Pages / Sections to Exclude</label>
  <textarea name="exclusions" id="exclusions" placeholder="e.g., /admin/, /cart/, /account/, user-generated content..." rows="2"></textarea>
</div>
<div class="field" id="field-previous_issues">
  <label for="previous_issues">Known Previous Issues</label>
  <textarea name="previous_issues" id="previous_issues" placeholder="Any past manual actions, penalties, or major technical problems..." rows="2"></textarea>
</div>
<div class="field" id="field-priority">
  <label for="priority">Priority</label>
  <select name="priority" id="priority">
    <option value="P0 (Urgent — site issues detected)">P0 (Urgent — site issues detected)</option>
    <option value="P1 (High — within 3 days)" selected>P1 (High — within 3 days)</option>
    <option value="P2 (Medium — within 1 week)">P2 (Medium — within 1 week)</option>
    <option value="P3 (Low — standard cadence)">P3 (Low — standard cadence)</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any special tools, access requirements, or context..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Request Audit</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">tech-audit</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "website", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "audit_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "audit_scope_custom", "type": "textarea", "required": false, "depends_on": "audit_type", "depends_value": "Custom scope"}, {"name": "page_count_estimate", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "staging_site", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "has_javascript", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "has_international", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "has_ecommerce", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "has_subdomains", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "exclusions", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "previous_issues", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "priority", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🛠️ Technical SEO Audit Request",
                submitted_at: new Date().toISOString(),
                form_id: "tech-audit"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tech-audit-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
