<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Forecasting Request</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Forecasting Request</h1>
            <p>Request a revenue, traffic, or conversion forecast with scenario modeling.</p>
        </div>
        <form data-skill-slug="forecasting-request" id="agent-form">
            
<div class="field" id="field-forecast_type">
  <label for="forecast_type">Forecast Type <span class="required">*</span></label>
  <select name="forecast_type" id="forecast_type" required>
    <option value="">-- Select --</option>
    <option value="Revenue / MRR forecast">Revenue / MRR forecast</option>
    <option value="Organic traffic forecast">Organic traffic forecast</option>
    <option value="Paid traffic forecast">Paid traffic forecast</option>
    <option value="Conversion rate forecast">Conversion rate forecast</option>
    <option value="Lead volume forecast">Lead volume forecast</option>
    <option value="Full-funnel forecast (traffic → leads → revenue)">Full-funnel forecast (traffic → leads → revenue)</option>
    <option value="Market share forecast">Market share forecast</option>
  </select>
</div>
<div class="field" id="field-time_horizon">
  <label for="time_horizon">Time Horizon <span class="required">*</span></label>
  <select name="time_horizon" id="time_horizon" required>
    <option value="30 days">30 days</option>
    <option value="90 days">90 days</option>
    <option value="6 months">6 months</option>
    <option value="12 months" selected>12 months</option>
    <option value="24 months">24 months</option>
  </select>
</div>
<div class="field" id="field-historical_data">
  <label for="historical_data">Historical Data <span class="required">*</span></label>
  <textarea name="historical_data" id="historical_data" required placeholder="Paste or describe historical performance. e.g.,
Jan: 1,000 sessions, 50 leads, $10K revenue
Feb: 1,200 sessions, 60 leads, $12K revenue
..." rows="4"></textarea>
</div>
<div class="field" id="field-baseline_metrics">
  <label for="baseline_metrics">Current Baseline Metrics</label>
  <input type="text" name="baseline_metrics" id="baseline_metrics" placeholder="e.g., 5,000 monthly sessions, 2% conversion rate, $50K MRR" value="">
</div>
<div class="field" id="field-growth_assumptions">
  <label for="growth_assumptions">Growth Assumptions</label>
  <textarea name="growth_assumptions" id="growth_assumptions" placeholder="What initiatives will drive growth? e.g., 4 new content pieces/month, $5K ad spend, schema deployment..." rows="3"></textarea>
</div>
<div class="field" id="field-seasonality">
  <label for="seasonality">Seasonality / Cyclical Patterns</label>
  <textarea name="seasonality" id="seasonality" placeholder="Any known seasonal effects? e.g., Q4 is peak, summer is slow, holiday dips..." rows="2"></textarea>
</div>
<div class="field" id="field-scenarios">
  <label for="scenarios">Scenarios to Model</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="scenarios" value="Conservative (slow growth)"> Conservative (slow growth)</label>
    <label class="checkbox-item"><input type="checkbox" name="scenarios" value="Base case (expected)"> Base case (expected)</label>
    <label class="checkbox-item"><input type="checkbox" name="scenarios" value="Optimistic (accelerated growth)"> Optimistic (accelerated growth)</label>
    <label class="checkbox-item"><input type="checkbox" name="scenarios" value="Best case (viral / breakthrough)"> Best case (viral / breakthrough)</label>
    <label class="checkbox-item"><input type="checkbox" name="scenarios" value="Downside (market downturn / competition)"> Downside (market downturn / competition)</label>
  </div>
</div>
<div class="field" id="field-confidence_interval">
  <label for="confidence_interval">Confidence Interval</label>
  <select name="confidence_interval" id="confidence_interval">
    <option value="80%">80%</option>
    <option value="90%" selected>90%</option>
    <option value="95%">95%</option>
  </select>
</div>
<div class="field" id="field-output_format">
  <label for="output_format">Output Format</label>
  <select name="output_format" id="output_format">
    <option value="Monthly table (markdown)" selected>Monthly table (markdown)</option>
    <option value="Quarterly summary">Quarterly summary</option>
    <option value="Chart + table (dashboard)">Chart + table (dashboard)</option>
    <option value="Monte Carlo simulation (probabilistic)">Monte Carlo simulation (probabilistic)</option>
    <option value="Executive summary only">Executive summary only</option>
  </select>
</div>
<div class="field" id="field-output_destination">
  <label for="output_destination">Save To</label>
  <select name="output_destination" id="output_destination">
    <option value="Client vault folder">Client vault folder</option>
    <option value="Profit plan">Profit plan</option>
    <option value="Both" selected>Both</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any specific models, assumptions, or constraints to include..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Generate Forecast</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">forecasting-request</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [ {"name": "forecast_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "time_horizon", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "historical_data", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "baseline_metrics", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "growth_assumptions", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "seasonality", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "scenarios", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "confidence_interval", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "output_format", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "output_destination", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🔮 Forecasting Request",
                submitted_at: new Date().toISOString(),
                form_id: "forecasting-request"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'forecasting-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
<script src="/forms/form-api-connector.js"></script>
</body>
</html>
