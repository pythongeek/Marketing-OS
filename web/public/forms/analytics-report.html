<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Analytics Report Configuration</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Report Configuration</h1>
            <p>Configure the scope, metrics, and format for an analytics report or dashboard.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-report_type">
  <label for="report_type">Report Type <span class="required">*</span></label>
  <select name="report_type" id="report_type" required>
    <option value="">-- Select --</option>
    <option value="Weekly Digest">Weekly Digest</option>
    <option value="Monthly Performance Report">Monthly Performance Report</option>
    <option value="Quarterly Business Review (QBR)">Quarterly Business Review (QBR)</option>
    <option value="Campaign Post-Mortem">Campaign Post-Mortem</option>
    <option value="Channel Attribution Analysis">Channel Attribution Analysis</option>
    <option value="Funnel Analysis">Funnel Analysis</option>
    <option value="Conversion Lift Study">Conversion Lift Study</option>
    <option value="Custom Dashboard">Custom Dashboard</option>
  </select>
</div>
<div class="field" id="field-date_range">
  <label for="date_range">Date Range <span class="required">*</span></label>
  <select name="date_range" id="date_range" required>
    <option value="">-- Select --</option>
    <option value="Last 7 days">Last 7 days</option>
    <option value="Last 30 days">Last 30 days</option>
    <option value="Last 90 days">Last 90 days</option>
    <option value="Year to date">Year to date</option>
    <option value="Custom range">Custom range</option>
  </select>
</div>
<div class="field" data-depends-on="date_range" data-depends-value="Custom range" id="field-date_range_custom_start">
  <label for="date_range_custom_start">Custom Start Date</label>
  <input type="date" name="date_range_custom_start" id="date_range_custom_start" value="">
</div>
<div class="field" data-depends-on="date_range" data-depends-value="Custom range" id="field-date_range_custom_end">
  <label for="date_range_custom_end">Custom End Date</label>
  <input type="date" name="date_range_custom_end" id="date_range_custom_end" value="">
</div>
<div class="field" id="field-metrics">
  <label for="metrics">Metrics to Include <span class="required">*</span></label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Organic traffic (sessions, users)"> Organic traffic (sessions, users)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Keyword rankings & position changes"> Keyword rankings & position changes</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="CTR & click data (GSC)"> CTR & click data (GSC)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Conversions & conversion rate"> Conversions & conversion rate</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Revenue / MRR impact"> Revenue / MRR impact</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Cost per acquisition (CPA)"> Cost per acquisition (CPA)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Return on ad spend (ROAS)"> Return on ad spend (ROAS)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Channel mix (traffic sources)"> Channel mix (traffic sources)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Device & geo breakdown"> Device & geo breakdown</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Page-level performance"> Page-level performance</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Content performance (top/bottom)"> Content performance (top/bottom)</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="Core Web Vitals trends"> Core Web Vitals trends</label>
    <label class="checkbox-item"><input type="checkbox" name="metrics" value="AEO/GEO citation metrics"> AEO/GEO citation metrics</label>
  </div>
</div>
<div class="field" id="field-comparison_period">
  <label for="comparison_period">Comparison Period</label>
  <select name="comparison_period" id="comparison_period">
    <option value="Previous period" selected>Previous period</option>
    <option value="Year-over-year">Year-over-year</option>
    <option value="No comparison">No comparison</option>
  </select>
</div>
<div class="field" id="field-segments">
  <label for="segments">Segments to Break Out</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="segments" value="New vs. returning visitors"> New vs. returning visitors</label>
    <label class="checkbox-item"><input type="checkbox" name="segments" value="Mobile vs. desktop"> Mobile vs. desktop</label>
    <label class="checkbox-item"><input type="checkbox" name="segments" value="Geo / region"> Geo / region</label>
    <label class="checkbox-item"><input type="checkbox" name="segments" value="Campaign / channel"> Campaign / channel</label>
    <label class="checkbox-item"><input type="checkbox" name="segments" value="Content type"> Content type</label>
    <label class="checkbox-item"><input type="checkbox" name="segments" value="Client-defined segments"> Client-defined segments</label>
  </div>
</div>
<div class="field" id="field-output_format">
  <label for="output_format">Output Format</label>
  <select name="output_format" id="output_format">
    <option value="Markdown report (vault)" selected>Markdown report (vault)</option>
    <option value="HTML dashboard">HTML dashboard</option>
    <option value="PDF export">PDF export</option>
    <option value="Slide deck (PPT)">Slide deck (PPT)</option>
    <option value="Email summary">Email summary</option>
  </select>
</div>
<div class="field" id="field-include_recommendations">
  <label for="include_recommendations">Include Recommendations</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="include_recommendations" value="Add actionable next steps and recommendations"> Add actionable next steps and recommendations</label>
  </div>
</div>
<div class="field" id="field-audience">
  <label for="audience">Report Audience</label>
  <select name="audience" id="audience">
    <option value="Internal team (detailed)">Internal team (detailed)</option>
    <option value="Client (executive summary)">Client (executive summary)</option>
    <option value="Client (detailed)" selected>Client (detailed)</option>
    <option value="Stakeholder / Investor">Stakeholder / Investor</option>
  </select>
</div>
<div class="field" id="field-delivery_date">
  <label for="delivery_date">Report Delivery Date</label>
  <input type="date" name="delivery_date" id="delivery_date" value="">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any specific KPIs, custom metrics, or reporting requirements..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Generate Report Config</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">analytics-report</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "report_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "date_range", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "date_range_custom_start", "type": "date", "required": false, "depends_on": "date_range", "depends_value": "Custom range"}, {"name": "date_range_custom_end", "type": "date", "required": false, "depends_on": "date_range", "depends_value": "Custom range"}, {"name": "metrics", "type": "checkbox", "required": true, "depends_on": null, "depends_value": null}, {"name": "comparison_period", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "segments", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "output_format", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "include_recommendations", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "audience", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "delivery_date", "type": "date", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "📊 Analytics Report Configuration",
                submitted_at: new Date().toISOString(),
                form_id: "analytics-report"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'analytics-report-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
