<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️ Competitor Intelligence Intake</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕵️ Competitor Intelligence Intake</h1>
            <p>Provide competitor details so the intel agent can build a full competitive analysis.</p>
        </div>
        <form id="agent-form">
            <div class="field" id="field-client">
  <label for="client">Client Name <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-competitor_1_name">
  <label for="competitor_1_name">Competitor #1 Name <span class="required">*</span></label>
  <input type="text" name="competitor_1_name" id="competitor_1_name" required placeholder="e.g., Competitor Inc." value="">
</div>
<div class="field" id="field-competitor_1_url">
  <label for="competitor_1_url">Competitor #1 Website <span class="required">*</span></label>
  <input type="url" name="competitor_1_url" id="competitor_1_url" required placeholder="https://competitor1.com" value="">
</div>
<div class="field" id="field-competitor_1_notes">
  <label for="competitor_1_notes">What do you know about them?</label>
  <textarea name="competitor_1_notes" id="competitor_1_notes" placeholder="Their strengths, weaknesses, positioning, pricing..." rows="3"></textarea>
</div>
<div class="field" id="field-competitor_2_name">
  <label for="competitor_2_name">Competitor #2 Name</label>
  <input type="text" name="competitor_2_name" id="competitor_2_name" placeholder="e.g., Rival Co." value="">
</div>
<div class="field" id="field-competitor_2_url">
  <label for="competitor_2_url">Competitor #2 Website</label>
  <input type="url" name="competitor_2_url" id="competitor_2_url" placeholder="https://competitor2.com" value="">
</div>
<div class="field" id="field-competitor_2_notes">
  <label for="competitor_2_notes">What do you know about them?</label>
  <textarea name="competitor_2_notes" id="competitor_2_notes" placeholder="Their strengths, weaknesses, positioning, pricing..." rows="3"></textarea>
</div>
<div class="field" id="field-competitor_3_name">
  <label for="competitor_3_name">Competitor #3 Name</label>
  <input type="text" name="competitor_3_name" id="competitor_3_name" placeholder="e.g., Alternative Ltd." value="">
</div>
<div class="field" id="field-competitor_3_url">
  <label for="competitor_3_url">Competitor #3 Website</label>
  <input type="url" name="competitor_3_url" id="competitor_3_url" placeholder="https://competitor3.com" value="">
</div>
<div class="field" id="field-competitor_3_notes">
  <label for="competitor_3_notes">What do you know about them?</label>
  <textarea name="competitor_3_notes" id="competitor_3_notes" placeholder="Their strengths, weaknesses, positioning, pricing..." rows="3"></textarea>
</div>
<div class="field" id="field-focus_areas">
  <label for="focus_areas">Focus Areas</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="SEO (keywords, backlinks, content)"> SEO (keywords, backlinks, content)</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Paid Ads (campaigns, creatives, spend)"> Paid Ads (campaigns, creatives, spend)</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Content (blog, resources, thought leadership)"> Content (blog, resources, thought leadership)</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Social Media (presence, engagement, followers)"> Social Media (presence, engagement, followers)</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Pricing & Positioning"> Pricing & Positioning</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Product Features & UX"> Product Features & UX</label>
    <label class="checkbox-item"><input type="checkbox" name="focus_areas" value="Reviews & Reputation"> Reviews & Reputation</label>
  </div>
<div class="help">What aspects should the intel agent prioritize?</div></div>
<div class="field" id="field-known_gaps">
  <label for="known_gaps">Known Gaps or Opportunities</label>
  <textarea name="known_gaps" id="known_gaps" placeholder="e.g., They don't have a pricing page, weak blog content, no video strategy..." rows="3"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Start Competitor Analysis</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">competitor-intake</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "competitor_1_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "competitor_1_url", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "competitor_1_notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_2_name", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_2_url", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_2_notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_3_name", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_3_url", "type": "url", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_3_notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "focus_areas", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "known_gaps", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🕵️ Competitor Intelligence Intake",
                submitted_at: new Date().toISOString(),
                form_id: "competitor-intake"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'competitor-intake-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
</body>
</html>
