<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔗 Link Outreach — Prospect Intake</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Link Outreach — Prospect Intake</h1>
            <p>Add new link prospects or request an outreach campaign for a specific client or page.</p>
        </div>
        <form id="agent-form" data-skill-slug="link-building-outreach">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <select name="client" id="client" required class="client-dropdown">
    <option value="">-- Select a client --</option>
</select>
<script>
(function() {
    const select = document.getElementById('client');
    if (!select) return;
    fetch('/api/clients')
        .then(r => r.json())
        .then(data => {
            const clients = data.clients || [];
            clients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.slug;
                opt.textContent = c.name + (c.industry ? ' (' + c.industry + ')' : '');
                select.appendChild(opt);
            });
        })
        .catch(err => console.error('Failed to load clients:', err));
})();
</script>
</div>
<div class="field" id="field-target_page">
  <label for="target_page">Page to Build Links To <span class="required">*</span></label>
  <input type="url" name="target_page" id="target_page" required placeholder="https://example.com/blog/target-page" value="">
</div>
<div class="field" id="field-target_keywords">
  <label for="target_keywords">Target Keywords for This Page</label>
  <input type="text" name="target_keywords" id="target_keywords" placeholder="e.g., best CRM software, CRM for small business" value="">
</div>
<div class="field" id="field-prospect_type">
  <label for="prospect_type">Prospect Type <span class="required">*</span></label>
  <select name="prospect_type" id="prospect_type" required>
    <option value="">-- Select --</option>
    <option value="Guest post opportunity">Guest post opportunity</option>
    <option value="Resource page link">Resource page link</option>
    <option value="Broken link replacement">Broken link replacement</option>
    <option value="Skyscraper outreach">Skyscraper outreach</option>
    <option value="HARO / Connectively pitch">HARO / Connectively pitch</option>
    <option value="Digital PR / Press mention">Digital PR / Press mention</option>
    <option value="Influencer collaboration">Influencer collaboration</option>
    <option value="Directory / List submission">Directory / List submission</option>
    <option value="Forum / Community link">Forum / Community link</option>
  </select>
</div>
<div class="field" id="field-prospect_url">
  <label for="prospect_url">Prospect Website / Page <span class="required">*</span></label>
  <input type="url" name="prospect_url" id="prospect_url" required placeholder="https://targetsite.com/blog/" value="">
</div>
<div class="field" id="field-prospect_contact">
  <label for="prospect_contact">Contact Email (if known)</label>
  <input type="email" name="prospect_contact" id="prospect_contact" placeholder="editor@targetsite.com" value="">
</div>
<div class="field" id="field-prospect_dr">
  <label for="prospect_dr">Prospect Domain Rating (DR)</label>
  <input type="number" name="prospect_dr" id="prospect_dr" placeholder="30" min="0" max="100" value="">
</div>
<div class="field" id="field-outreach_angle">
  <label for="outreach_angle">Outreach Angle <span class="required">*</span></label>
  <textarea name="outreach_angle" id="outreach_angle" required placeholder="Why should they link to you? What value do you offer?" rows="3"></textarea>
</div>
<div class="field" id="field-personalization_notes">
  <label for="personalization_notes">Personalization Notes</label>
  <textarea name="personalization_notes" id="personalization_notes" placeholder="Anything specific about this prospect: their recent articles, their interests, mutual connections..." rows="2"></textarea>
</div>
<div class="field" id="field-follow_up_count">
  <label for="follow_up_count">Follow-up Sequence</label>
  <select name="follow_up_count" id="follow_up_count">
    <option value="No follow-up">No follow-up</option>
    <option value="1 follow-up">1 follow-up</option>
    <option value="2 follow-ups" selected>2 follow-ups</option>
    <option value="3 follow-ups (max)">3 follow-ups (max)</option>
  </select>
</div>
<div class="field" id="field-template_style">
  <label for="template_style">Email Template Style</label>
  <select name="template_style" id="template_style">
    <option value="Value-first (no ask)" selected>Value-first (no ask)</option>
    <option value="Direct ask (polite)">Direct ask (polite)</option>
    <option value="Collaboration pitch">Collaboration pitch</option>
    <option value="Data / study share">Data / study share</option>
    <option value="Resource suggestion">Resource suggestion</option>
  </select>
</div>
<div class="field" id="field-batch_size">
  <label for="batch_size">Batch Size (prospects per week)</label>
  <input type="number" name="batch_size" id="batch_size" placeholder="10" min="1" max="100" value="10">
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any special instructions for this outreach campaign..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Add to Outreach Queue</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">outreach-prospect</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "target_page", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "target_keywords", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "prospect_type", "type": "select", "required": true, "depends_on": null, "depends_value": null}, {"name": "prospect_url", "type": "url", "required": true, "depends_on": null, "depends_value": null}, {"name": "prospect_contact", "type": "email", "required": false, "depends_on": null, "depends_value": null}, {"name": "prospect_dr", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "outreach_angle", "type": "textarea", "required": true, "depends_on": null, "depends_value": null}, {"name": "personalization_notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}, {"name": "follow_up_count", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "template_style", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "batch_size", "type": "number", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🔗 Link Outreach — Prospect Intake",
                submitted_at: new Date().toISOString(),
                form_id: "outreach-prospect"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'outreach-prospect-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
    <script src="/forms/form-api-connector.js"></script>
</body>
</html>
