<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Reputation Monitoring Setup</title>
    <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a40; --text: #e0e0e0; --muted: #888; --accent: #4A90D9; --accent-hover: #357ABD; --danger: #E74C3C; --success: #50C878; --warning: #F39C12; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
    .header h1 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; }
    .header p { margin: 0; color: var(--muted); font-size: 15px; }
    .field { margin-bottom: 24px; }
    .field.hidden { display: none; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .required { color: var(--danger); }
    .help { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input, select, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); font-size: 14px; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input:invalid, select:invalid, textarea:invalid { border-color: var(--danger); }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-item, .radio-item { display: flex; align-items: center; gap: 8px; }
    .checkbox-item input, .radio-item input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
    .status.success { background: rgba(80,200,120,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
    .status.error { background: rgba(231,76,60,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }
    .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .agent-id { font-family: monospace; background: var(--card); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Reputation Monitoring Setup</h1>
            <p>Configure brand mention monitoring, review tracking, and crisis response protocols.</p>
        </div>
        <form id="agent-form" data-skill-slug="reputation-manager">
            <div class="field" id="field-client">
  <label for="client">Client <span class="required">*</span></label>
  <input type="text" name="client" id="client" required placeholder="e.g., acme-saas" value="">
</div>
<div class="field" id="field-brand_name">
  <label for="brand_name">Brand Name(s) to Monitor <span class="required">*</span></label>
  <input type="text" name="brand_name" id="brand_name" required placeholder="e.g., Acme, Acme Inc., Acme Software" value="">
</div>
<div class="field" id="field-product_names">
  <label for="product_names">Product Names to Monitor</label>
  <input type="text" name="product_names" id="product_names" placeholder="e.g., Acme CRM, Acme Analytics (comma-separated)" value="">
</div>
<div class="field" id="field-executive_names">
  <label for="executive_names">Executive Names to Monitor</label>
  <input type="text" name="executive_names" id="executive_names" placeholder="e.g., CEO name, founder name (comma-separated)" value="">
</div>
<div class="field" id="field-monitoring_sources">
  <label for="monitoring_sources">Sources to Monitor <span class="required">*</span></label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Google Reviews"> Google Reviews</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Yelp"> Yelp</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Trustpilot"> Trustpilot</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="G2"> G2</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Capterra"> Capterra</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="BBB"> BBB</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="App Store / Play Store"> App Store / Play Store</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Reddit"> Reddit</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Twitter/X"> Twitter/X</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="LinkedIn"> LinkedIn</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="News / Press"> News / Press</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Forums / Communities"> Forums / Communities</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="YouTube comments"> YouTube comments</label>
    <label class="checkbox-item"><input type="checkbox" name="monitoring_sources" value="Glassdoor (employer reputation)"> Glassdoor (employer reputation)</label>
  </div>
</div>
<div class="field" id="field-alert_threshold">
  <label for="alert_threshold">Alert Threshold</label>
  <select name="alert_threshold" id="alert_threshold">
    <option value="Any new negative review (<3 stars)" selected>Any new negative review (<3 stars)</option>
    <option value="Negative sentiment spike (>2σ)">Negative sentiment spike (>2σ)</option>
    <option value="Viral mention (shares >100)">Viral mention (shares >100)</option>
    <option value="Crisis keyword detected (lawsuit, scam, fraud)">Crisis keyword detected (lawsuit, scam, fraud)</option>
    <option value="Manual action only">Manual action only</option>
  </select>
</div>
<div class="field" id="field-response_protocol">
  <label for="response_protocol">Review Response Protocol</label>
  <select name="response_protocol" id="response_protocol">
    <option value="Auto-draft response (human approves)" selected>Auto-draft response (human approves)</option>
    <option value="Auto-publish positive review thanks">Auto-publish positive review thanks</option>
    <option value="Human-only (no auto-response)">Human-only (no auto-response)</option>
    <option value="Escalate to human for all negative reviews">Escalate to human for all negative reviews</option>
  </select>
</div>
<div class="field" id="field-response_tone">
  <label for="response_tone">Response Tone</label>
  <select name="response_tone" id="response_tone">
    <option value="Professional & Empathetic" selected>Professional & Empathetic</option>
    <option value="Direct & Solution-oriented">Direct & Solution-oriented</option>
    <option value="Warm & Personal">Warm & Personal</option>
    <option value="Legal / Formal (for serious issues)">Legal / Formal (for serious issues)</option>
  </select>
</div>
<div class="field" id="field-competitor_mentions">
  <label for="competitor_mentions">Competitor Mention Tracking</label>
  <div class="checkbox-group">
    <label class="checkbox-item"><input type="checkbox" name="competitor_mentions" value="Track when competitors are mentioned alongside our brand"> Track when competitors are mentioned alongside our brand</label>
  </div>
</div>
<div class="field" id="field-crisis_keywords">
  <label for="crisis_keywords">Crisis Keywords to Watch</label>
  <input type="text" name="crisis_keywords" id="crisis_keywords" placeholder="e.g., lawsuit, scam, fraud, data breach, outage, refund" value="">
</div>
<div class="field" id="field-escalation_contact">
  <label for="escalation_contact">Crisis Escalation Contact</label>
  <input type="text" name="escalation_contact" id="escalation_contact" placeholder="Name and email for immediate crisis alerts" value="">
</div>
<div class="field" id="field-reporting_frequency">
  <label for="reporting_frequency">Reporting Frequency</label>
  <select name="reporting_frequency" id="reporting_frequency">
    <option value="Daily">Daily</option>
    <option value="Weekly" selected>Weekly</option>
    <option value="Monthly">Monthly</option>
  </select>
</div>
<div class="field" id="field-notes">
  <label for="notes">Notes</label>
  <textarea name="notes" id="notes" placeholder="Any past reputation issues, known detractors, or special monitoring requirements..." rows="2"></textarea>
</div>

            <div class="actions">
                <button type="submit" class="btn-primary">Configure Monitoring</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>
        </form>
        <div id="status" class="status"></div>
        <div class="footer">
            <p>Form ID: <span class="agent-id">reputation-monitoring</span></p>
            <p>Generated by AgenticMarketingPro Form Engine</p>
        </div>
    </div>
    <script>
        const fields = [{"name": "client", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "brand_name", "type": "text", "required": true, "depends_on": null, "depends_value": null}, {"name": "product_names", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "executive_names", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "monitoring_sources", "type": "checkbox", "required": true, "depends_on": null, "depends_value": null}, {"name": "alert_threshold", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "response_protocol", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "response_tone", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "competitor_mentions", "type": "checkbox", "required": false, "depends_on": null, "depends_value": null}, {"name": "crisis_keywords", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "escalation_contact", "type": "text", "required": false, "depends_on": null, "depends_value": null}, {"name": "reporting_frequency", "type": "select", "required": false, "depends_on": null, "depends_value": null}, {"name": "notes", "type": "textarea", "required": false, "depends_on": null, "depends_value": null}];
        const form = document.getElementById('agent-form');
        const status = document.getElementById('status');

        // Load from localStorage
        function loadForm() {
            const saved = localStorage.getItem('form_' + form.id);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    Object.keys(data).forEach(key => {
                        const el = form.querySelector(`[name="${key}"]`);
                        if (el) {
                            if (el.type === 'checkbox') {
                                el.checked = data[key];
                            } else {
                                el.value = data[key];
                            }
                        }
                    });
                    updateConditionalFields();
                } catch (e) {}
            }
        }

        // Save to localStorage on change
        form.addEventListener('input', function() {
            const data = {};
            fields.forEach(f => {
                const el = form.querySelector(`[name="${f.name}"]`);
                if (el) {
                    data[f.name] = el.type === 'checkbox' ? el.checked : el.value;
                }
            });
            localStorage.setItem('form_' + form.id, JSON.stringify(data));
        });

        // Conditional fields
        function updateConditionalFields() {
            fields.forEach(f => {
                if (f.depends_on) {
                    const parent = form.querySelector(`[name="${f.depends_on}"]`);
                    const fieldDiv = document.getElementById('field-' + f.name);
                    if (parent && fieldDiv) {
                        const parentValue = parent.type === 'checkbox' ? parent.checked : parent.value;
                        const shouldShow = !f.depends_value || parentValue === f.depends_value;
                        fieldDiv.classList.toggle('hidden', !shouldShow);
                    }
                }
            });
        }

        form.addEventListener('change', updateConditionalFields);

        // Submit handler
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            const result = {};
            fields.forEach(f => {
                if (f.type === 'checkbox' && f.options.length > 1) {
                    result[f.name] = formData.getAll(f.name);
                } else if (f.type === 'checkbox') {
                    result[f.name] = form.querySelector(`[name="${f.name}"]`).checked;
                } else {
                    result[f.name] = formData.get(f.name);
                }
            });

            // Add metadata
            result._meta = {
                form_title: "🛡️ Reputation Monitoring Setup",
                submitted_at: new Date().toISOString(),
                form_id: "reputation-monitoring"
            };

            const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'reputation-monitoring-response.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Form saved successfully! Response written to: " + a.download;
            status.className = "status success";
        });

        function clearForm() {
            form.reset();
            localStorage.removeItem('form_' + form.id);
            updateConditionalFields();
            status.className = "status";
        }

        // Initialize
        loadForm();
        updateConditionalFields();
    </script>
    <script src="/forms/form-api-connector.js"></script>
</body>
</html>
